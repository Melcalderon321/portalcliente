<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos Útiles - Tehuentec</title>
    <!-- CSS -->
    <link rel="stylesheet" href="index.css">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div class="bg-glow-container">
        <div class="bg-glow glow-1"></div>
        <div class="bg-glow glow-2"></div>
        <div class="bg-glow glow-3"></div>
    </div>

    <div class="viewport-switcher">
        <button class="view-btn" id="view-mob" onclick="switchView('mobile')" title="Vista Mobile">
            <ion-icon name="smartphone-outline"></ion-icon>
        </button>
        <button class="view-btn" id="view-desk" onclick="switchView('desktop')" title="Vista Desktop (1440px)">
            <ion-icon name="desktop-outline"></ion-icon>
        </button>
    </div>


    <header class="header">
        <img src="iso.png" alt="Tehuentec Logo" class="logo">
        <p style="background: linear-gradient(135deg, #FFFFFF 0%, #B0B0B0 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Portal Cliente</p>
    </header>

    <main class="container animate-fade">
        <a href="index.html" class="btn-back">
            <ion-icon name="arrow-back-outline"></ion-icon>
            Volver al Portal
        </a>

        <!-- Guías y Herramientas -->
        <div class="card" style="margin-bottom: 40px;">
            <span class="section-tag">Guías y Acceso</span>
            <h2 class="section-title">Herramientas Útiles</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 25px;">
                Descargá configuraciones rápidas y accedé a información clave para tu gestión.
            </p>

            <div style="display: flex; flex-direction: column; gap: 10px;">
                <a href="#" class="resource-item">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <ion-icon name="mail-open-outline"></ion-icon>
                        <span>Configurar Outlook</span>
                    </div>
                    <ion-icon name="download-outline" style="color: var(--text-muted);"></ion-icon>
                </a>
                <a href="#" class="resource-item">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <ion-icon name="link-outline"></ion-icon>
                        <span>Delegar DNS</span>
                    </div>
                    <ion-icon name="open-outline" style="color: var(--text-muted);"></ion-icon>
                </a>
                <a href="planes.html" class="resource-item">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <ion-icon name="document-text-outline"></ion-icon>
                        <span>Descripción de planes</span>
                    </div>
                    <ion-icon name="chevron-forward-outline" style="color: var(--text-muted);"></ion-icon>
                </a>
                <a href="proceso.html" class="resource-item">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <ion-icon name="map-outline"></ion-icon>
                        <span>Proceso Web</span>
                    </div>
                    <ion-icon name="chevron-forward-outline" style="color: var(--text-muted);"></ion-icon>
                </a>
            </div>
        </div>
    </main>

    <footer class="footer-branded">
        <div class="footer-content">
            <img src="footer-logo.svg" alt="Tehuentec" class="footer-logo">
            <div class="footer-info">
                <p>Diseño y desarrollo web realizado por <a href="https://tehuentec.com" target="_blank">Tehuentec</a> by THT Corporation</p>
            </div>
        </div>
    </footer>

    <!-- App JS -->
    <script src="app.js"></script>
</body>
</html>
